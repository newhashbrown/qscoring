<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="940" viewBox="0 0 1320 940" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#FBBF24"/>
    </marker>
    <marker id="arrTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#34D399"/>
    </marker>
    <marker id="arrMute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#778999"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1320" height="940" fill="#0A0E17"/>

  <!-- title -->
  <text x="44" y="52" font-size="30" font-weight="700" fill="#F8FAFC">QScoring — CI/CD Pipeline</text>
  <text x="45" y="76" font-size="13" letter-spacing="1.5" fill="#FBBF24" font-family="'JetBrains Mono', monospace">NEXT.JS 16 · OPENNEXT ADAPTER · CLOUDFLARE WORKERS · qscoring.com</text>

  <!-- ============ BAND 1 : SHIP PATH ============ -->
  <text x="44" y="118" font-size="12" letter-spacing="2" fill="#778999" font-family="'JetBrains Mono', monospace">1 · SHIP PATH — CODE TO PRODUCTION</text>

  <!-- nodes -->
  <g>
    <!-- feature branch -->
    <rect x="44" y="134" width="200" height="72" rx="10" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="144" y="166" font-size="15" font-weight="600" fill="#F8FAFC" text-anchor="middle">Feature branch</text>
    <text x="144" y="187" font-size="12" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">feat/*</text>

    <!-- pull request -->
    <rect x="312" y="134" width="200" height="72" rx="10" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="412" y="166" font-size="15" font-weight="600" fill="#F8FAFC" text-anchor="middle">Pull Request</text>
    <text x="412" y="187" font-size="12" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">GitHub</text>

    <!-- CI gate (gold = the gate) -->
    <rect x="580" y="134" width="220" height="72" rx="10" fill="#1A2238" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="690" y="162" font-size="15" font-weight="700" fill="#F8FAFC" text-anchor="middle">Workers Builds</text>
    <text x="690" y="184" font-size="11.5" fill="#FBBF24" text-anchor="middle" font-family="'JetBrains Mono', monospace">preview · CI gate (must be green)</text>

    <!-- main -->
    <rect x="868" y="134" width="190" height="72" rx="10" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="963" y="166" font-size="15" font-weight="600" fill="#F8FAFC" text-anchor="middle">Squash-merge</text>
    <text x="963" y="187" font-size="12" fill="#34D399" text-anchor="middle" font-family="'JetBrains Mono', monospace">→ main</text>

    <!-- deploy -->
    <rect x="1126" y="134" width="150" height="72" rx="10" fill="#1A2238" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="1201" y="162" font-size="15" font-weight="700" fill="#F8FAFC" text-anchor="middle">Deploy</text>
    <text x="1201" y="184" font-size="11" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">push (filtered)</text>
  </g>

  <!-- ship arrows -->
  <g stroke="#FBBF24" stroke-width="2" fill="none">
    <line x1="244" y1="170" x2="306" y2="170" marker-end="url(#arr)"/>
    <line x1="512" y1="170" x2="574" y2="170" marker-end="url(#arr)"/>
    <line x1="800" y1="170" x2="862" y2="170" marker-end="url(#arr)"/>
    <line x1="1058" y1="170" x2="1120" y2="170" marker-end="url(#arr)"/>
  </g>
  <g font-size="10.5" fill="#CBD5E1" text-anchor="middle" font-family="'JetBrains Mono', monospace">
    <text x="275" y="162">git push</text>
    <text x="543" y="162">open PR</text>
    <text x="831" y="162">✓ green</text>
    <text x="1089" y="162">merge</text>
  </g>

  <!-- deploy detail callout -->
  <text x="1201" y="232" font-size="10.5" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">Workers Builds (native)</text>
  <text x="1201" y="247" font-size="10.5" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">+ Actions deploy.yml</text>
  <text x="1201" y="262" font-size="10.5" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">opennext build &amp;&amp; deploy</text>

  <!-- arrow from deploy down into runtime -->
  <path d="M1201 270 L1201 312" stroke="#FBBF24" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- ============ BAND 2 : RUNTIME ============ -->
  <rect x="44" y="318" width="1232" height="248" rx="14" fill="#0F172A" stroke="rgba(255,255,255,0.10)"/>
  <text x="68" y="350" font-size="16" font-weight="700" fill="#F8FAFC">Cloudflare Workers — Edge runtime</text>
  <text x="69" y="370" font-size="11.5" fill="#778999" font-family="'JetBrains Mono', monospace">OpenNext worker · serves SSR / ISR / API routes at qscoring.com</text>

  <!-- bindings -->
  <text x="68" y="404" font-size="11" letter-spacing="1.5" fill="#FBBF24" font-family="'JetBrains Mono', monospace">BINDINGS (wrangler.jsonc)</text>
  <g font-family="'JetBrains Mono', monospace">
    <rect x="68" y="416" width="172" height="58" rx="9" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="154" y="441" font-size="13" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">D1 · DB</text>
    <text x="154" y="459" font-size="10.5" fill="#778999" text-anchor="middle">snapshots · watchlist · subs</text>

    <rect x="256" y="416" width="172" height="58" rx="9" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="342" y="441" font-size="13" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">KV</text>
    <text x="342" y="459" font-size="10.5" fill="#778999" text-anchor="middle">NEXT_INC_CACHE (ISR)</text>

    <rect x="444" y="416" width="150" height="58" rx="9" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
    <text x="519" y="441" font-size="13" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">ASSETS · AI</text>
    <text x="519" y="459" font-size="10.5" fill="#778999" text-anchor="middle">static · Workers AI</text>

    <rect x="610" y="416" width="200" height="58" rx="9" fill="#141C2E" stroke="#F59E0B" stroke-width="1.2"/>
    <text x="710" y="441" font-size="13" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">Rate-limit bindings</text>
    <text x="710" y="459" font-size="10.5" fill="#FBBF24" text-anchor="middle">EMAIL · ANALYZE · FMP</text>
  </g>

  <!-- external services -->
  <text x="846" y="404" font-size="11" letter-spacing="1.5" fill="#FBBF24" font-family="'JetBrains Mono', monospace">EXTERNAL (secrets)</text>
  <g font-family="'JetBrains Mono', monospace">
    <rect x="846" y="416" width="100" height="58" rx="9" fill="#1A2238" stroke="rgba(255,255,255,0.10)"/>
    <text x="896" y="441" font-size="12.5" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">FMP</text>
    <text x="896" y="459" font-size="10" fill="#778999" text-anchor="middle">scores</text>

    <rect x="958" y="416" width="100" height="58" rx="9" fill="#1A2238" stroke="rgba(255,255,255,0.10)"/>
    <text x="1008" y="441" font-size="12.5" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">Resend</text>
    <text x="1008" y="459" font-size="10" fill="#778999" text-anchor="middle">email</text>

    <rect x="1070" y="416" width="100" height="58" rx="9" fill="#1A2238" stroke="#34D399" stroke-width="1.2"/>
    <text x="1120" y="441" font-size="12.5" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">Clerk</text>
    <text x="1120" y="459" font-size="10" fill="#34D399" text-anchor="middle">auth · prod</text>

    <rect x="1182" y="416" width="80" height="58" rx="9" fill="#1A2238" stroke="rgba(255,255,255,0.10)"/>
    <text x="1222" y="441" font-size="12.5" font-weight="600" fill="#F8FAFC" text-anchor="middle" font-family="Inter, sans-serif">Stripe</text>
    <text x="1222" y="459" font-size="10" fill="#778999" text-anchor="middle">billing</text>
  </g>

  <!-- secret note -->
  <text x="68" y="508" font-size="11" fill="#CBD5E1" font-family="'JetBrains Mono', monospace">Secrets via <tspan fill="#FBBF24">wrangler secret</tspan> (never in repo): FMP_API_KEY · RESEND_API_KEY · CLERK_SECRET_KEY · STRIPE_SECRET_KEY · STRIPE_WEBHOOK_SECRET · *_CRON_TOKEN · ADMIN_EMAIL</text>
  <text x="68" y="532" font-size="11" fill="#CBD5E1" font-family="'JetBrains Mono', monospace">Public var: <tspan fill="#34D399">NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY</tspan> (pk_live, clerk.qscoring.com)</text>

  <!-- ============ BAND 3 : SCHEDULED DATA PATH ============ -->
  <text x="44" y="612" font-size="12" letter-spacing="2" fill="#778999" font-family="'JetBrains Mono', monospace">2 · SCHEDULED DATA PATH — GITHUB ACTIONS CRON</text>

  <!-- cron triggers -->
  <rect x="44" y="628" width="268" height="150" rx="12" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
  <text x="64" y="654" font-size="14" font-weight="700" fill="#F8FAFC">Scheduled workflows</text>
  <g font-size="11.5" font-family="'JetBrains Mono', monospace">
    <text x="64" y="680" fill="#CBD5E1">refresh-universe-stats</text>
    <text x="296" y="680" fill="#778999" text-anchor="end">02:00 UTC</text>
    <text x="64" y="704" fill="#CBD5E1">refresh-strong-picks</text>
    <text x="296" y="704" fill="#778999" text-anchor="end">09:30 UTC</text>
    <text x="64" y="728" fill="#CBD5E1">weekly-recap</text>
    <text x="296" y="728" fill="#778999" text-anchor="end">Mon 14:00</text>
    <text x="64" y="758" fill="#778999">+ workflow_dispatch (manual)</text>
  </g>

  <!-- build scripts -->
  <rect x="392" y="654" width="210" height="98" rx="12" fill="#141C2E" stroke="rgba(255,255,255,0.10)"/>
  <text x="497" y="690" font-size="14" font-weight="600" fill="#F8FAFC" text-anchor="middle">tsx build scripts</text>
  <text x="497" y="712" font-size="10.5" fill="#778999" text-anchor="middle" font-family="'JetBrains Mono', monospace">scoreboard · snapshots</text>
  <text x="497" y="728" font-size="10.5" fill="#FBBF24" text-anchor="middle" font-family="'JetBrains Mono', monospace">FMP_API_KEY</text>

  <line x1="312" y1="703" x2="386" y2="703" stroke="#FBBF24" stroke-width="2" marker-end="url(#arr)"/>

  <!-- branch A: commit data -->
  <rect x="690" y="600" width="262" height="74" rx="12" fill="#0F172A" stroke="rgba(255,255,255,0.10)"/>
  <text x="710" y="628" font-size="13" font-weight="600" fill="#F8FAFC">git commit data/*.json → main</text>
  <text x="711" y="650" font-size="10.5" fill="#778999" font-family="'JetBrains Mono', monospace">JSON snapshots — path-excluded,</text>
  <text x="711" y="665" font-size="10.5" fill="#F87171" font-family="'JetBrains Mono', monospace">does NOT trigger a deploy</text>
  <path d="M602 688 C 645 688, 648 645, 686 640" stroke="#778999" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#arrMute)"/>

  <!-- branch B: POST to cron API -->
  <rect x="690" y="700" width="262" height="78" rx="12" fill="#141C2E" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="710" y="727" font-size="13" font-weight="600" fill="#F8FAFC">POST /api/cron/*</text>
  <text x="711" y="748" font-size="10.5" fill="#CBD5E1" font-family="'JetBrains Mono', monospace">persist-snapshot · watchlist-alerts</text>
  <text x="711" y="764" font-size="10.5" fill="#FBBF24" font-family="'JetBrains Mono', monospace">Authorization: Bearer &lt;CRON_TOKEN&gt;</text>
  <path d="M602 718 C 645 718, 648 738, 686 738" stroke="#FBBF24" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- cron API → D1 / runtime -->
  <path d="M952 738 C 1010 738, 1010 560, 600 530 L 600 478" stroke="#34D399" stroke-width="2" fill="none" marker-end="url(#arrTeal)"/>
  <text x="1035" y="700" font-size="10.5" fill="#34D399" font-family="'JetBrains Mono', monospace" text-anchor="middle">writes D1 ·</text>
  <text x="1035" y="715" font-size="10.5" fill="#34D399" font-family="'JetBrains Mono', monospace" text-anchor="middle">sends alerts</text>

  <!-- legend -->
  <g font-size="10.5" font-family="'JetBrains Mono', monospace">
    <text x="44" y="812" fill="#778999">LEGEND</text>
    <rect x="110" y="803" width="22" height="3" fill="#FBBF24"/>
    <text x="140" y="812" fill="#CBD5E1">ship / trigger</text>
    <rect x="260" y="803" width="22" height="3" fill="#34D399"/>
    <text x="290" y="812" fill="#CBD5E1">runtime write</text>
    <rect x="410" y="803" width="22" height="3" fill="#778999"/>
    <text x="440" y="812" fill="#CBD5E1">no-deploy data commit</text>
    <text x="44" y="838" fill="#778999">Gold border = CI/CD gate or token-protected boundary.</text>
  </g>
</svg>
