name: Weekly forward-track recap

# Builds data/recaps/{date}.json from the last 7 days of snapshot files,
# commits it, and lets Cloudflare Workers Builds redeploy. The /blog/recaps
# index reads the recaps directory at request time so the new file appears
# without code changes.
#
# Cron: Mondays at 14:00 UTC = ~10am ET. Runs after Friday's market close
# has been captured + the weekend. Pairs prior Friday's snapshot with this
# Friday's snapshot for a clean 7-trading-day forward-return window.

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build weekly recap
        run: npm run weekly-recap

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/recaps/)" ]]; then
            echo "No new recap data — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/recaps/
          git commit -m "chore: weekly recap $(date -u +%Y-%m-%d)"
          # Rebase-retry push: another scheduled workflow can push to main
          # concurrently. A bare push would lose to a non-fast-forward and drop
          # the commit (the 2026-06-02 lost-push incident). Date-keyed JSON ⇒
          # rebase conflicts near-impossible; fail loudly if one occurs.
          pushed=false
          for i in 1 2 3; do
            if git push; then pushed=true; break; fi
            echo "Push attempt $i/3 rejected (concurrent push to main) — rebasing on origin/main and retrying…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Push to origin/main failed after 3 rebase-retry attempts — failing loudly so the weekly recap is not silently lost."
            exit 1
          fi
