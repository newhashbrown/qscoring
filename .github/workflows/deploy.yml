name: Deploy to Cloudflare Workers

# Triggers on code changes to main. JSON snapshots under data/ — the
# auto-refreshed scoreboards, snapshots, universe stats, etc. — are
# excluded; the scheduled refresh-* workflows produce those and a full
# Worker rebuild is not required. Top-level .ts/.tsx files under data/
# (blog-posts.tsx, categories.ts, glossary.ts) ARE source code imported
# by the app and DO need to trigger a deploy.
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "lib/**"
      - "data/*.ts"
      - "data/*.tsx"
      - "public/**"
      - "migrations/**"
      - "package*.json"
      - "wrangler.jsonc"
      - "open-next.config.ts"
      - "next.config.*"
      - "tsconfig.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 89df760ebec4b6f5cd5b4680b75d3732
