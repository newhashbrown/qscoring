name: Freshness sentinel

# Independent watcher for DATA freshness — the guard the 2026-07-02..04
# staleness incident showed was missing. Every job-level guard protects the
# scorer (no contaminated builds), but a failed ingest followed by
# holiday/weekend skip runs kept everything green while the site sat on a
# June 30 corpus and the dead-man's switch kept getting pinged by no-op runs.
#
# This job compares the committed snapshot ledger (data/snapshots/) against
# the last COMPLETED NYSE session using a real trading calendar
# (exchange_calendars XNYS — never weekday math), and:
#   - sends a Resend alert when the ledger is > 1 trading day behind;
#   - sends a Resend alert when freshness CANNOT be determined (fail-loud —
#     an unknown state is an incident, not a pass);
#   - pings its healthchecks.io check ONLY on a verified-fresh verdict, so a
#     hung/never-scheduled sentinel surfaces through the dead-man's switch.
#
# Owner setup to arm fully: create a healthchecks.io check with a 1-day
# period + a few hours grace and store its ping URL as the
# HEALTHCHECK_SENTINEL_URL repo secret.

on:
  schedule:
    # 10:30 UTC daily: hours after the 06:00 UTC pre-market build (plus
    # GitHub's routine multi-hour scheduling delay), and before the US open
    # for most of the year — the ledger should already hold the last
    # completed close by now.
    - cron: '30 10 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: scripts/freshness_sentinel/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r scripts/freshness_sentinel/requirements.txt

      # Gate on the unit tests (calendar/session math, ledger parsing). A
      # broken sentinel must not silently attest freshness.
      - name: Run unit tests
        working-directory: scripts
        run: python -m pytest freshness_sentinel/tests -q

      - name: Check snapshot freshness (alerts + fail on violation)
        run: python scripts/freshness_sentinel/check.py
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HEALTHCHECK_SENTINEL_URL: ${{ secrets.HEALTHCHECK_SENTINEL_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # Backstop: if check.py crashed before it could send its own alert
      # (e.g. dependency install failure upstream, Resend unreachable), the
      # workflow failure itself emails. Same sender/recipient as the other
      # refresh workflows.
      - name: Email alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WF: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"QScoring Alerts <alerts@qscoring.com>\",\"to\":[\"gagansingh2000@yahoo.com\"],\"subject\":\"❌ $WF failed\",\"text\":\"Workflow '$WF' failed — the snapshot ledger is stale OR freshness could not be determined.\n\nRun: $RUN_URL\"}"
