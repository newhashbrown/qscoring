name: v0.4 bank impact dry-run

# Manual, read-only: recomputes exact v0.3→v0.4 composite/signal deltas for
# banks from live FMP data (scores each name twice from the same inputs — gate
# ON vs OFF). No D1 writes, no deploy, no commit — output is in the run log.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Recompute bank deltas (v0.4 vs v0.3)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: npm run dry-run-v04
