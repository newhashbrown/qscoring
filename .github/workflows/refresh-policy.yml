name: Refresh policy exposures

# Policy exposure tagging (AI-analysis roadmap, Phase 3).
#
# Offline + idempotent: scripts/generate-policy-tags.ts reads each ticker's
# sector/industry/description grounding from the Worker, skips tickers whose
# input_hash is unchanged, classifies only the rest through the Anthropic Message
# Batches API, runs the degeneracy guard, and persists back through the Worker.
# Policy exposure is slow-moving profile data, so a weekly run is cheap — it
# reclassifies only companies whose profile actually changed.
#
# NOTE: requires the policy-grounding + persist-policy-tags routes to be live in
# production (they deploy with this branch's merge to main via Workers Builds).

on:
  schedule:
    - cron: "0 10 * * 0" # 10:00 UTC Sunday — after refresh-narratives (09:00 UTC Sun)
  workflow_dispatch:
    inputs:
      sample:
        description: "Classify only the 5-ticker sample"
        type: boolean
        default: false
      max_tickers:
        description: "Cap tickers per run (blank = no cap)"
        type: string
        default: ""

permissions:
  contents: write # regen step commits data/policy-levels.json back to main

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci

      - name: Classify policy exposures
        env:
          QSCORING_BASE: https://qscoring.com
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SNAPSHOT_CRON_TOKEN: ${{ secrets.SNAPSHOT_CRON_TOKEN }}
          POLICY_MAX_TICKERS: ${{ github.event.inputs.max_tickers }}
          SAMPLE: ${{ github.event.inputs.sample }}
        run: |
          if [ "$SAMPLE" = "true" ]; then
            npm run policy-tags -- --sample
          else
            npm run policy-tags
          fi

      # Regenerate the committed levels projection (data/policy-levels.json) that
      # powers the /scores policy category pages, then commit it if it changed.
      # The classify step above just persisted the fresh classifications to D1;
      # this reads them back via wrangler and rewrites the side artifact so the
      # screener facet never drifts from the chips. The push triggers a Workers
      # Builds deploy, so the category pages pick up the new levels.
      - name: Regenerate + commit policy-levels.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: "89df760ebec4b6f5cd5b4680b75d3732"
        run: |
          npm run policy-levels
          git add data/policy-levels.json
          if git diff --staged --quiet; then
            echo "No change to policy-levels.json — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh policy-levels.json"
          # Rebase-retry: other cron jobs (strong-picks) push to main during this
          # window; a bare push would lose to a non-fast-forward. policy-levels.json
          # is the only file staged, so a rebase conflict is near-impossible.
          pushed=false
          for i in 1 2 3; do
            if git push; then pushed=true; break; fi
            echo "Push attempt $i/3 rejected — rebasing on origin/main and retrying…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Push of policy-levels.json failed after 3 rebase-retry attempts."
            exit 1
          fi

      - name: Email alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WF: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then echo "No Resend key; skipping alert"; exit 0; fi
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" -H "Content-Type: application/json" \
            -d "{\"from\":\"QScoring Alerts <alerts@qscoring.com>\",\"to\":[\"gagansingh2000@yahoo.com\"],\"subject\":\"❌ $WF failed\",\"text\":\"Policy classification failed. Run: $RUN_URL\"}"
