name: Refresh strong picks

# Daily rebuild of:
#   - data/strong-picks.json     — homepage carousel + landing surfaces
#   - data/scoreboard.json       — per-ticker rows for category, compare,
#                                   portfolio, and watchlist-alert features
#   - data/market-strip.json     — precomputed universe-average composite for
#                                   the site-wide MarketStrip (keeps the full
#                                   scoreboard out of the root layout bundle)
#   - data/snapshots/YYYY-MM-DD.json — append-only locked snapshot for /performance
#
# Hits the deployed /api/score endpoint so it leverages the production
# cache layer. Commits and pushes only if the data actually changed
# (so no-op days don't churn deploys). After the push, sleeps to give
# Cloudflare Workers Builds time to deploy, then triggers the watchlist
# alert cron so users get a same-day digest of any signal flips.

on:
  schedule:
    # 09:30 UTC = ~4:30am ET, before US pre-market activity. Picks reflect
    # the prior trading day's close. This PRE-MARKET run is the only one
    # allowed to rescore: /api/score returns the prior session's settled
    # close, so the snapshot's price/changePercent are faithful. If GitHub
    # delays this run INTO the 09:30–16:00 ET session (it slipped to 11:04 ET
    # on 2026-06-22), /quote returns live intraday prices — the snapshot guard
    # refuses the build (session_open) rather than freeze them under the
    # prior-close label and contaminate the ledger.
    - cron: '30 9 * * *'
    # 18:00 UTC = ~13:00–14:00 ET, MID-SESSION. Recovery DETECTOR only. On a
    # good day the 09:30 snapshot already exists → guard skips (no-op). On a
    # bad day the guard FAILS LOUDLY rather than rescoring: a mid-session
    # rescore would write live intraday price/change mislabeled as the prior
    # close and contaminate the no-look-ahead ledger. A genuinely-missed
    # snapshot is backfilled by hand from FMP historical close.
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Local/debug flag only. Does NOT bypass the snapshot guard: non-trading-day and in-session runs are always refused to protect the no-look-ahead ledger. Backfill a missed day from FMP historical close via scripts/backfill-snapshots.ts.'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # ~800-name universe × 2s pacing = ~27 min of scoring, plus install
    # (~1-2 min), commit/push (a few sec), and the 4-min post-deploy sleep
    # + watchlist alert call. Raised 50 → 90 after the 2026-05-28 run hit the
    # 50-min ceiling mid-score and permanently lost that snapshot; 90 leaves
    # wide headroom for slow FMP responses without aborting a half-built run.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Decide what this run should do BEFORE spending ~27 min rescoring.
      # snapshot-guard.ts reuses lib/market-date (the same marketCloseDate +
      # isUsTradingDay the build writes with), so the guard can never target a
      # different date than build-strong-picks.ts produces.
      #   mode=skip  — non-trading day, or the snapshot already landed on
      #                origin/main (good-day no-op, esp. the 18:00 run).
      #   mode=build — pre-market 09:30 / manual window with the snapshot
      #                missing: proceed with a faithful rescore.
      #   mode=fail  — 18:00 recovery window with the snapshot missing: a mid-
      #                session rescore would contaminate the no-look-ahead
      #                ledger, so fail loudly and let a human backfill.
      - name: Snapshot guard (skip / build / fail-loud)
        id: guard
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          # snapshot-guard.ts reuses lib/market-date for the date + session
          # facts; the skip/build/fail decision itself lives in the unit-tested
          # lib/snapshot-mode.ts (via scripts/decide-snapshot-mode.ts) so this
          # workflow and the tests can never diverge.
          OUT=$(npx tsx scripts/snapshot-guard.ts)
          EXPECTED=$(printf '%s\n' "$OUT" | sed -n 's/^expected=//p')
          TRADING=$(printf '%s\n' "$OUT" | sed -n 's/^trading=//p')
          SESSION=$(printf '%s\n' "$OUT" | sed -n 's/^session_open=//p')
          echo "expected=$EXPECTED" >> "$GITHUB_OUTPUT"

          SNAPSHOT_EXISTS=false
          git fetch origin main --depth=1
          if git cat-file -e "FETCH_HEAD:data/snapshots/${EXPECTED}.json" 2>/dev/null; then
            SNAPSHOT_EXISTS=true
          fi

          IS_RECOVERY=false
          if [ "$SCHEDULE" = "0 18 * * *" ]; then IS_RECOVERY=true; fi

          DEC=$(TRADING="$TRADING" SESSION_OPEN="$SESSION" SNAPSHOT_EXISTS="$SNAPSHOT_EXISTS" IS_RECOVERY="$IS_RECOVERY" npx tsx scripts/decide-snapshot-mode.ts)
          MODE=$(printf '%s\n' "$DEC" | sed -n 's/^mode=//p')
          REASON=$(printf '%s\n' "$DEC" | sed -n 's/^reason=//p')
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Target ${EXPECTED} (trading=${TRADING} session_open=${SESSION} snapshot_exists=${SNAPSHOT_EXISTS} schedule='${SCHEDULE:-manual}') → mode=${MODE} (${REASON})"

          case "$MODE" in
            skip)
              echo "Nothing to produce (${REASON}). Skipping."
              exit 0
              ;;
            build)
              echo "Snapshot ${EXPECTED}.json missing — market-closed window, proceeding with a faithful rescore."
              exit 0
              ;;
            fail)
              if [ "$REASON" = "recovery-detector-snapshot-missing" ]; then
                echo "::error::Snapshot ${EXPECTED}.json is still missing at the 18:00 recovery check — the 09:30 run failed to land it. NOT rescoring: a mid-session rescore would write live intraday price/change mislabeled as the ${EXPECTED} close and poison the no-look-ahead ledger. Backfill by hand from FMP historical close (see scripts/backfill-snapshots.ts)."
              else
                echo "::error::Refusing to build ${EXPECTED}.json: now is inside a regular trading session (09:30–16:00 ET) — GitHub delayed this run into market hours. /api/score returns LIVE INTRADAY prices that would be frozen under the ${EXPECTED} (prior-close) label and poison the no-look-ahead ledger (the 2026-06-22 contamination). A missing snapshot self-heals at the next pre-market run; a contaminated one does not. For a deliberate backfill use scripts/backfill-snapshots.ts (FMP historical close)."
              fi
              exit 1
              ;;
            *)
              echo "::error::Unknown guard mode '${MODE}' (reason='${REASON}')."
              exit 1
              ;;
          esac

      - name: Build strong picks + scoreboard + snapshot
        if: steps.guard.outputs.mode == 'build'
        run: npm run strong-picks
        env:
          QSCORING_BASE: https://qscoring.com
          # Resolves the live S&P 500 constituent list at startup so index
          # rebalances flow through without a manual PR. Same secret value
          # already used by refresh-universe-stats.yml. Hard requirement —
          # the script aborts if unset.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Token enables the post-write D1 persistence call to
          # /api/cron/persist-snapshot. If unset, the script logs a
          # warning and skips D1 persist — JSON commit still proceeds,
          # so missing this secret is non-fatal during onboarding.
          SNAPSHOT_CRON_TOKEN: ${{ secrets.SNAPSHOT_CRON_TOKEN }}
          # Manual override: dispatching with force_run=true bypasses the
          # non-trading-day guard in build-strong-picks.ts. Empty on scheduled
          # runs, so the weekend/holiday skip stays in effect there.
          FORCE_RUN: ${{ inputs.force_run && '1' || '' }}

      - name: Commit and push if changed
        id: commit
        if: steps.guard.outputs.mode == 'build'
        env:
          EXPECTED: ${{ steps.guard.outputs.expected }}
        run: |
          # Stage all the daily-refresh data files (script writes five of them).
          git add data/compare-universe.json data/strong-picks.json data/scoreboard.json data/market-strip.json data/snapshots/
          if git diff --staged --quiet; then
            echo "No change to refresh data — skipping commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Commit message references the snapshot DATE actually written (the
          # prior trading day), not the UTC run date. The old run-date label
          # was off by one ("snapshot 2026-06-02" while writing 2026-06-01.json)
          # and cost real time during the 06-01/06-02 diagnosis.
          git commit -m "chore: refresh strong picks + scoreboard + snapshot ${EXPECTED}"
          # Rebase-retry push. refresh-universe-stats can push to main during
          # this job's ~27-min build; a bare push then loses to a non-fast-
          # forward and the commit dies with the runner — exactly the
          # 2026-06-02 loss (2026-06-01.json built + committed locally, push
          # rejected, gone). Data files are date-keyed JSON, so a rebase
          # conflict is near-impossible; if one happens, the loop fails loudly.
          pushed=false
          for i in 1 2 3; do
            if git push; then pushed=true; break; fi
            echo "Push attempt $i/3 rejected (concurrent push to main) — rebasing on origin/main and retrying…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Push to origin/main failed after 3 rebase-retry attempts — failing loudly so the snapshot is not silently lost (see 2026-06-02 lost-push incident)."
            exit 1
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # A green run MUST guarantee the snapshot landed on the REMOTE. The
      # 2026-06-02 loss built and committed 2026-06-01.json locally but the
      # push was rejected and the commit died with the runner — "committed
      # locally" is not success. Re-fetch origin/main and assert the file is
      # there; fail loudly if not.
      - name: Verify snapshot landed on origin/main
        if: steps.guard.outputs.mode == 'build'
        env:
          EXPECTED: ${{ steps.guard.outputs.expected }}
        run: |
          git fetch origin main --depth=1
          if ! git cat-file -e "FETCH_HEAD:data/snapshots/${EXPECTED}.json" 2>/dev/null; then
            echo "::error::Snapshot ${EXPECTED}.json is NOT on origin/main after push. A build that does not land on the remote is a failure (see 2026-06-02 lost-push incident)."
            exit 1
          fi
          echo "Verified: data/snapshots/${EXPECTED}.json is present on origin/main."

      - name: Wait for Cloudflare deploy + trigger watchlist alerts
        if: steps.commit.outputs.pushed == 'true'
        # Cloudflare Workers Builds usually deploys within 1-2 minutes of a
        # push. Sleep 4 min as a safety margin before hitting the alert
        # endpoint — otherwise the cron would read the OLD scoreboard from
        # the previous deploy and miss today's flips.
        run: |
          echo "Sleeping 240s to let Cloudflare deploy..."
          sleep 240
          # The endpoint requires Authorization: Bearer ${WATCHLIST_CRON_TOKEN}.
          # WATCHLIST_CRON_TOKEN must be set in BOTH:
          #   1. Cloudflare secret (so the worker can verify): wrangler secret put WATCHLIST_CRON_TOKEN
          #   2. GitHub repo secret (so this workflow can authenticate): repo Settings → Secrets → Actions
          # Same value in both places.
          response=$(curl -sS -X POST https://qscoring.com/api/cron/watchlist-alerts \
            -H "Authorization: Bearer ${{ secrets.WATCHLIST_CRON_TOKEN }}" \
            -H "Content-Type: application/json" \
            -w "\nHTTP_STATUS:%{http_code}")
          echo "$response"
          status=$(echo "$response" | tail -n 1 | sed 's/HTTP_STATUS://')
          if [[ "$status" != "200" ]]; then
            echo "Alert cron returned non-200 — failing soft (snapshot was still pushed successfully)."
            # Don't exit non-zero; the snapshot is committed and that's the
            # critical path. Alert delivery is best-effort and any error is
            # surfaced in the response body for debugging.
          fi

      # Dead-man's-switch ping. Fires on any successful completion — a real
      # build, an 18:00 no-op, or a non-trading-day skip — so the absence of a
      # ping (e.g. a hung or never-scheduled run) is itself the alert.
      # continue-on-error + the URL coming from a secret means this is inert
      # until HEALTHCHECK_URL is set; create the healthchecks.io check and add
      # the secret to arm it.
      - name: Ping healthcheck on success
        if: success()
        continue-on-error: true
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "HEALTHCHECK_URL not set — skipping ping (create the healthchecks.io check and add the secret to arm this)."
            exit 0
          fi
          curl -fsS "$HEALTHCHECK_URL"

      # Email alert on ANY failure — a timeout, a coverage abort, a push that
      # never landed, or an 18:00 fail-loud miss. `from` must be a Resend-
      # verified qscoring.com sender; `to` is the personal inbox. Dynamic
      # values go through env (not inline ${{ }}) so the JSON can't be broken
      # by the workflow name.
      - name: Email alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WF: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"QScoring Alerts <alerts@qscoring.com>\",\"to\":[\"gagansingh2000@yahoo.com\"],\"subject\":\"❌ $WF failed\",\"text\":\"Workflow '$WF' failed.\n\nRun: $RUN_URL\n\nIf this is the 18:00 recovery check, the prior trading day's snapshot is missing — backfill from FMP historical close (scripts/backfill-snapshots.ts).\"}"
