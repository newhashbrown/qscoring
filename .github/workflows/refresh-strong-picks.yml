name: Refresh strong picks

# Daily rebuild of data/strong-picks.json. Hits the deployed /api/score
# endpoint to leverage the production cache layer; commits and pushes only
# if the file actually changed (so we don't churn deploys on no-op runs).

on:
  schedule:
    # 09:30 UTC = ~4:30am ET, before US pre-market activity. Picks reflect
    # the prior trading day's close.
    - cron: '30 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build strong picks
        run: npm run strong-picks
        env:
          QSCORING_BASE: https://qscoring.com

      - name: Commit and push if changed
        run: |
          if [[ -z "$(git status --porcelain data/strong-picks.json)" ]]; then
            echo "No change to strong picks — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/strong-picks.json
          git commit -m "chore: refresh strong picks $(date -u +%Y-%m-%d)"
          git push
