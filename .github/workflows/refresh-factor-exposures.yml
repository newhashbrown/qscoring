name: Refresh factor exposures

# Monthly Fama-French factor-exposure regression batch
# (scripts/factor_exposures/run.py): per-ticker OLS of monthly excess returns on
# the FF 5-factor (2x3) + Momentum factors with Newey-West (HAC) errors. Writes
# an append-only committed snapshot (data/factor-exposures/<date>.json) AND loads
# the rows into D1 via /api/cron/persist-factor-exposures. The Worker only reads
# the precomputed rows — no regression compute in any request path.
#
# Schedule rationale: the 10th of the month so the prior month's Ken French
# data has reliably posted (FF updates with a lag — the 5th proved optimistic;
# the library often hasn't refreshed that early). Idempotent: a same-month
# re-run overwrites its snapshot row and re-commits the JSON. The render-time
# staleness guard (lib/scoring/factor-exposures.ts, 75-day budget) fails the
# Factor Profile closed if this job stops landing.

on:
  schedule:
    # SCHEDULE (single source of truth): 07:00 UTC on the 10th of each month.
    - cron: '0 7 10 * *'
  workflow_dispatch:
    inputs:
      max_tickers:
        description: 'Limit to N tickers (0 = whole universe). Use a small N for a live persist smoke test; partial runs skip the snapshot commit.'
        required: false
        default: '0'

permissions:
  contents: write # commits the append-only snapshot JSON to main

jobs:
  regress:
    runs-on: ubuntu-latest
    # ~800 tickers, one paced FMP price pull each, plus the one-time FF fetch and
    # per-ticker OLS. Generous headroom so a slow FMP day can't abort a run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: scripts/factor_exposures/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r scripts/factor_exposures/requirements.txt

      # Gate the run on the unit tests (regression β-recovery, classifier
      # thresholds, FF alignment, serialization). A broken build must not write
      # bad data into the snapshot/D1.
      - name: Run unit tests
        working-directory: scripts
        run: python -m pytest factor_exposures/tests -q

      - name: Compute factor exposures (writes snapshot + persists to D1)
        run: python scripts/factor_exposures/run.py --max-tickers "${MAX_TICKERS:-0}"
        env:
          # Indirected through an env var (not inlined in run:) to avoid
          # expression injection. 0 = whole universe (scheduled runs).
          MAX_TICKERS: ${{ github.event.inputs.max_tickers || '0' }}
          QSCORING_BASE: https://qscoring.com
          # Pulls dividend-adjusted price history per universe ticker. Same secret
          # value used by the other refresh workflows. Hard requirement.
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Authorizes POST /api/cron/persist-factor-exposures. Reuses the snapshot
          # cron secret; must be set in BOTH the Cloudflare worker secret and this
          # repo's Actions secrets (same value). If unset, run.py writes the JSON
          # snapshot but skips D1 persist (non-fatal during onboarding).
          SNAPSHOT_CRON_TOKEN: ${{ secrets.SNAPSHOT_CRON_TOKEN }}

      - name: Commit and push the snapshot if changed
        # Only commit a FULL run. A partial smoke test (max_tickers > 0) still
        # persists to D1 but must not land a partial snapshot on the branch.
        if: ${{ github.event.inputs.max_tickers == '' || github.event.inputs.max_tickers == '0' }}
        run: |
          git add data/factor-exposures/
          if git diff --staged --quiet; then
            echo "No change to factor-exposure data — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh factor exposures $(date -u +%Y-%m)"
          # Rebase-retry push: other refresh jobs can push to main during this
          # run; a bare push then loses to a non-fast-forward. Date-keyed JSON
          # makes a rebase conflict near-impossible; if one happens, fail loudly.
          pushed=false
          for i in 1 2 3; do
            if git push; then pushed=true; break; fi
            echo "Push attempt $i/3 rejected (concurrent push to main) — rebasing on origin/main and retrying…"
            git pull --rebase origin main
          done
          if [ "$pushed" != "true" ]; then
            echo "::error::Push to origin/main failed after 3 rebase-retry attempts — failing loudly so the snapshot is not silently lost."
            exit 1
          fi

      # Dead-man's-switch ping — attests DATA freshness, not job completion
      # (same pattern as refresh-strong-picks + the freshness sentinel). Fires
      # ONLY when a full run's snapshot is verifiably committed on origin/main
      # AND its window reaches at least the previous calendar month; a smoke
      # test (max_tickers > 0) produces no attestable corpus and never pings.
      # Configure the healthchecks.io check with a ~31-day period + a few days
      # grace to match the monthly cadence.
      - name: Ping healthcheck when the factor snapshot is verifiably fresh
        if: success() && (github.event.inputs.max_tickers == '' || github.event.inputs.max_tickers == '0')
        continue-on-error: true
        env:
          HEALTHCHECK_FACTORS_URL: ${{ secrets.HEALTHCHECK_FACTORS_URL }}
        run: |
          if [ -z "$HEALTHCHECK_FACTORS_URL" ]; then
            echo "HEALTHCHECK_FACTORS_URL not set — skipping ping (create the check and add the secret to arm this)."
            exit 0
          fi
          git fetch origin main --depth=1
          NEWEST=$(git ls-tree --name-only FETCH_HEAD data/factor-exposures/ \
            | sed -n 's|.*/\([0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}\)\.json|\1|p' | sort | tail -1)
          # The window must reach at least the start of the PREVIOUS month —
          # i.e. the newest committed month-end is the one this run just
          # computed (or newer). Otherwise the corpus is stale: withhold the
          # ping so the dead-man's switch fires.
          FLOOR=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y-%m-%d)
          if [ -z "$NEWEST" ] || [ "$NEWEST" \< "$FLOOR" ]; then
            echo "Newest committed factor snapshot '$NEWEST' is older than $FLOOR — withholding the healthcheck ping."
            exit 0
          fi
          echo "Verified factor snapshot $NEWEST on origin/main — pinging."
          curl -fsS "$HEALTHCHECK_FACTORS_URL"

      - name: Email alert on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WF: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"from\":\"QScoring Alerts <alerts@qscoring.com>\",\"to\":[\"gagansingh2000@yahoo.com\"],\"subject\":\"❌ $WF failed\",\"text\":\"Workflow '$WF' failed.\n\nRun: $RUN_URL\"}"
